<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe: Rivals</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ══ THEME VARS ══ */
:root{
  --bg:#f5f2ee;--surface:#fff;--border:#ddd8d0;--text:#1a1814;--muted:#8a8075;--faint:#e8e4de;
  --r:#c0392b;--r-l:#fdf0ee;--r-m:#f5c6c1;--r-d:#7d1f16;
  --b:#1a5fa8;--b-l:#edf3fc;--b-m:#b8d0f0;--b-d:#0e3d6e;
  --g:#1e7a4a;--g-l:#eaf6ef;--g-m:#a8dcbc;--g-d:#0f4a2a;
  --o:#c97820;--o-l:#fef4e6;--o-m:#f5d59a;--o-d:#7a4510;
  --w:#6b3e1e;--w-l:#f5ece4;--w-m:#d4a882;--w-d:#3e200a;
  --y:#b89000;--y-l:#fef9e0;--y-m:#f0d96a;--y-d:#6b5000;
  --r2:#7d1f16;--r2-l:#f2d5d0;--r2-m:#d98880;
  --b2:#0a2d52;--b2-l:#cce0f7;--b2-m:#7aaeea;
  --g2:#0a3d1e;--g2-l:#c2e8ce;--g2-m:#5cbd8a;
  --o2:#7a4510;--o2-l:#f7e4cc;--o2-m:#d4a040;
  --w2:#3e200a;--w2-l:#e8d5c2;--w2-m:#a87050;
  --y2:#6b5000;--y2-l:#f5edb8;--y2-m:#d4b800;
  --cell:90px;--gap:6px;--rad:6px;
  --glow:none;
}
[data-theme="dark"]{
  --bg:#0f0e0c;--surface:#1a1814;--border:#2e2a24;--text:#f0ede8;--muted:#6a6560;--faint:#252219;
  --r:#e04030;--r-l:#1e0e0a;--r-m:#5a1a12;--r-d:#f5a090;
  --b:#3a80d0;--b-l:#080f1e;--b-m:#12275a;--b-d:#90c0f5;
  --g:#28a060;--g-l:#081408;--g-m:#10402a;--g-d:#80d0a0;
  --o:#e08030;--o-l:#1a0f04;--o-m:#503010;--o-d:#f5c080;
  --w:#90582a;--w-l:#140b04;--w-m:#402010;--w-d:#d0a070;
  --y:#d0a800;--y-l:#141000;--y-m:#484000;--y-d:#f0d860;
  --r2:#a03020;--r2-l:#1a0808;--r2-m:#401510;
  --b2:#183060;--b2-l:#060c1a;--b2-m:#0a1840;
  --g2:#105030;--g2-l:#050e06;--g2-m:#0a2a18;
  --o2:#804010;--o2-l:#160c02;--o2-m:#2e1a06;
  --w2:#502a0a;--w2-l:#100804;--w2-m:#201006;
  --y2:#504800;--y2-l:#100e00;--y2-m:#282000;
  --glow:0 0 12px rgba(255,255,255,0.08);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* ══ AMBIENT ══ */
#ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.amb{position:absolute;font-family:'DM Serif Display',serif;display:flex;align-items:center;justify-content:center;border-radius:7px;will-change:transform,opacity;}
[data-theme="dark"] .amb{box-shadow:0 0 8px rgba(255,255,255,0.06);}
@keyframes ambfall{0%{transform:translateY(var(--sy)) rotate(var(--rot));opacity:0;}5%{opacity:var(--pk);}82%{opacity:var(--pk);}100%{transform:translateY(calc(var(--sy)+120vh)) rotate(calc(var(--rot)+var(--spin)));opacity:0;}}

/* ══ TOP-LEFT CONTROLS ══ */
#top-left{position:fixed;top:12px;left:12px;z-index:200;display:flex;align-items:center;gap:8px;}
#site-back{padding:5px 13px;background:var(--text);color:var(--bg);border:none;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;opacity:.7;transition:opacity .2s;}
#site-back:hover{opacity:1;}
.icon-btn{width:30px;height:30px;border:none;border-radius:50%;background:rgba(26,24,20,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .2s;flex-shrink:0;}
.icon-btn:hover{background:rgba(26,24,20,.85);}
[data-theme="dark"] .icon-btn{background:rgba(240,237,230,.15);}
[data-theme="dark"] .icon-btn:hover{background:rgba(240,237,230,.3);}
.icon-btn svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
[data-theme="dark"] .icon-btn svg{stroke:#f0ede8;}

/* ══ VOL PANEL ══ */
#vol-panel{position:fixed;top:50px;left:12px;z-index:190;background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:12px 14px;width:185px;box-shadow:0 4px 20px rgba(0,0,0,.18);display:none;transition:background .3s,border-color .3s;}
#vol-panel.open{display:block;}
#vol-panel-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
#vol-slider{width:100%;cursor:pointer;accent-color:var(--text);}
#music-enable-btn{margin-top:10px;width:100%;padding:7px;background:var(--text);color:var(--bg);border:none;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
#music-enable-btn:hover{opacity:.85;}

/* ══ MASTHEAD ══ */
.masthead{position:relative;z-index:1;text-align:center;border-bottom:2px solid var(--text);padding-bottom:.85rem;margin-bottom:1.6rem;}
.masthead .tic{font-family:'DM Serif Display',serif;font-size:clamp(1.3rem,4.5vw,2rem);letter-spacing:-.01em;line-height:1;color:var(--text);}
.masthead .rivals{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(2.2rem,8vw,3.8rem);letter-spacing:-.03em;line-height:1;color:var(--text);display:block;font-weight:700;}

/* ══ FACT BANNER ══ */
#fact-banner{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--o-d);background:var(--o-l);border:1px solid var(--o-m);border-radius:4px;padding:4px 12px;text-align:center;margin-bottom:.5rem;display:none;}
#fact-banner.show{display:block;}

/* ══ MOBILE LAYOUT ══ */
.page-wrap{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 3rem;min-height:100vh;}
.wrap{position:relative;z-index:1;width:100%;max-width:580px;}
.screen{display:none;}.screen.active{display:block;}

/* ══ DESKTOP LAYOUT ≥900px ══ */
@media(min-width:900px){
  .page-wrap{display:grid;grid-template-areas:'hd hd hd' 'lp gm rp';grid-template-columns:1fr minmax(0,580px) 1fr;grid-template-rows:auto 1fr;gap:0 2rem;padding:1.5rem 2rem 2rem;align-items:start;}
  .masthead{grid-area:hd;max-width:none;margin-bottom:1.2rem;}
  .wrap{grid-area:gm;max-width:none;}
  #side-left{grid-area:lp;display:block;position:sticky;top:1.5rem;}
  #side-right{grid-area:rp;display:block;position:sticky;top:1.5rem;}
  :root{--cell:108px;}
  #scr-game .legstrip{display:none!important;}/* moved to sidebar */
  #scr-game .scoreboard{display:none!important;}/* moved to sidebar */
}
@media(max-width:899px){
  #side-left,#side-right{display:none!important;}
}
.side-panel{display:flex;flex-direction:column;gap:8px;}
.side-sbox{border:1.5px solid var(--border);border-radius:var(--rad);padding:10px 13px;background:var(--surface);position:relative;overflow:hidden;box-shadow:var(--glow);}
.side-sbox.rb{border-color:var(--r-m);background:var(--r-l);}
.side-sbox.bb{border-color:var(--b-m);background:var(--b-l);}
.side-sbox.gb{border-color:var(--g-m);background:var(--g-l);}
.side-sbox.ob{border-color:var(--o-m);background:var(--o-l);}
.side-sbox.wb{border-color:var(--w-m);background:var(--w-l);}
.side-sbox.yb{border-color:var(--y-m);background:var(--y-l);}
.side-ghost{position:absolute;right:-10px;bottom:-14px;font-family:'DM Serif Display',serif;font-size:4.5rem;line-height:1;pointer-events:none;transform:rotate(-14deg);opacity:.08;user-select:none;}
.side-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;position:relative;z-index:1;}
.side-score{font-family:'DM Serif Display',serif;font-size:2.2rem;line-height:1;position:relative;z-index:1;}
.side-lc{border:1px solid var(--border);border-radius:var(--rad);padding:8px 10px;background:var(--surface);font-size:10.5px;color:var(--muted);line-height:1.45;box-shadow:var(--glow);}
.side-lc strong{display:block;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:2px;}
.side-lc.rl{border-color:var(--r-m);}.side-lc.rl strong{color:var(--r);}
.side-lc.bl{border-color:var(--b-m);}.side-lc.bl strong{color:var(--b);}
.side-lc.gl{border-color:var(--g-m);}.side-lc.gl strong{color:var(--g);}
.side-lc.ol{border-color:var(--o-m);}.side-lc.ol strong{color:var(--o);}
.side-lc.wl{border-color:var(--w-m);}.side-lc.wl strong{color:var(--w);}
.side-lc.yl{border-color:var(--y-m);}.side-lc.yl strong{color:var(--y);}
.side-draws{text-align:center;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.8;}
.side-draws span{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--muted);display:block;}
.rb .side-score{color:var(--r);}.bb .side-score{color:var(--b);}.gb .side-score{color:var(--g);}.ob .side-score{color:var(--o);}.wb .side-score{color:var(--w);}.yb .side-score{color:var(--y);}
.rb .side-lbl{color:var(--r);}.bb .side-lbl{color:var(--b);}.gb .side-lbl{color:var(--g);}.ob .side-lbl{color:var(--o);}.wb .side-lbl{color:var(--w);}.yb .side-lbl{color:var(--y);}

/* ══ PILLS ══ */
.mode-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.pill{padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;}
.pill:hover{border-color:var(--text);color:var(--text);}.pill.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.opt-row{display:none;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center;}.opt-row.show{display:flex;}
.opt-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}

/* ══ CHAR SELECT ══ */
.select-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem .9rem;margin-bottom:1rem;}
.pcol{display:flex;flex-direction:column;}
.pcol-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;height:20px;}
.ai-badge{background:var(--text);color:var(--bg);font-size:9px;padding:1px 5px;border-radius:3px;letter-spacing:.1em;}
.char-picker{display:flex;align-items:stretch;gap:7px;flex:1;}
.carr{width:26px;min-width:26px;border:1.5px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);user-select:none;transition:border-color .15s,color .15s;}
.carr:hover{border-color:var(--text);color:var(--text);}
.ccard{flex:1;border:1.5px solid var(--border);border-radius:var(--rad);padding:11px 13px;background:var(--surface);display:flex;flex-direction:column;height:162px;overflow:hidden;transition:border-color .2s,background .2s;}
.ccard.rt{border-color:var(--r-m);background:var(--r-l);}.ccard.bt{border-color:var(--b-m);background:var(--b-l);}
.ccard.gt{border-color:var(--g-m);background:var(--g-l);}.ccard.ot{border-color:var(--o-m);background:var(--o-l);}
.ccard.wt{border-color:var(--w-m);background:var(--w-l);}.ccard.yt{border-color:var(--y-m);background:var(--y-l);}
.ccard.qt{border-color:var(--border);background:var(--faint);}
.csym{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1;margin-bottom:3px;}
.rt .csym{color:var(--r);}.bt .csym{color:var(--b);}.gt .csym{color:var(--g);}
.ot .csym{color:var(--o);}.wt .csym{color:var(--w);}.yt .csym{color:var(--y);}.qt .csym{color:var(--muted);}
.cname{font-size:12px;font-weight:600;letter-spacing:.02em;margin-bottom:2px;}
.rt .cname{color:var(--r-d);}.bt .cname{color:var(--b-d);}.gt .cname{color:var(--g-d);}
.ot .cname{color:var(--o-d);}.wt .cname{color:var(--w-d);}.yt .cname{color:var(--y-d);}.qt .cname{color:var(--muted);}
.cpl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:3px;}
.rt .cpl{color:var(--r);}.bt .cpl{color:var(--b);}.gt .cpl{color:var(--g);}
.ot .cpl{color:var(--o);}.wt .cpl{color:var(--w);}.yt .cpl{color:var(--y);}.qt .cpl{color:var(--muted);}
.cdesc{font-size:10px;color:var(--muted);line-height:1.45;overflow:hidden;}
.cancel-wrap{overflow:hidden;max-height:0;transition:max-height .3s ease;margin-bottom:0;}
.cancel-wrap.open{max-height:80px;margin-bottom:.8rem;}
.cancel-note{font-size:11px;color:var(--muted);padding:7px 10px;border:1px solid var(--border);border-radius:var(--rad);background:var(--surface);line-height:1.5;}
.cancel-note strong{font-weight:600;color:var(--text);}
.start-btn{width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:var(--rad);font-family:'DM Serif Display',serif;font-size:1.1rem;letter-spacing:.02em;cursor:pointer;transition:opacity .15s,transform .1s;margin-bottom:.6rem;}
.start-btn:hover{opacity:.88;}.start-btn:active{transform:scale(.99);}

/* ══ SCOREBOARD (mobile inline) ══ */
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:.8rem;align-items:center;}
.sbox{border:1.5px solid var(--border);border-radius:var(--rad);padding:10px 13px;background:var(--surface);position:relative;overflow:hidden;box-shadow:var(--glow);}
.sbox.rb{border-color:var(--r-m);background:var(--r-l);}.sbox.bb{border-color:var(--b-m);background:var(--b-l);}
.sbox.gb{border-color:var(--g-m);background:var(--g-l);}.sbox.ob{border-color:var(--o-m);background:var(--o-l);}
.sbox.wb{border-color:var(--w-m);background:var(--w-l);}.sbox.yb{border-color:var(--y-m);background:var(--y-l);}
.sbox.r2b{border-color:var(--r2-m);background:var(--r2-l);}.sbox.b2b{border-color:var(--b2-m);background:var(--b2-l);}
.sbox.g2b{border-color:var(--g2-m);background:var(--g2-l);}.sbox.o2b{border-color:var(--o2-m);background:var(--o2-l);}
.sbox.w2b{border-color:var(--w2-m);background:var(--w2-l);}.sbox.y2b{border-color:var(--y2-m);background:var(--y2-l);}
.ghost{position:absolute;right:-10px;bottom:-14px;font-family:'DM Serif Display',serif;font-size:5rem;line-height:1;pointer-events:none;transform:rotate(-14deg);opacity:.08;user-select:none;}
.shn{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;position:relative;z-index:1;}
.rb .shn{color:var(--r);}.bb .shn{color:var(--b);}.gb .shn{color:var(--g);}
.ob .shn{color:var(--o);}.wb .shn{color:var(--w);}.yb .shn{color:var(--y);}
.r2b .shn{color:var(--r2);}.b2b .shn{color:var(--b2);}.g2b .shn{color:var(--g2);}
.o2b .shn{color:var(--o2);}.w2b .shn{color:var(--w2);}.y2b .shn{color:var(--y2);}
.sv{font-family:'DM Serif Display',serif;font-size:1.9rem;line-height:1;position:relative;z-index:1;}
.rb .sv{color:var(--r);}.bb .sv{color:var(--b);}.gb .sv{color:var(--g);}
.ob .sv{color:var(--o);}.wb .sv{color:var(--w);}.yb .sv{color:var(--y);}
.r2b .sv{color:var(--r2);}.b2b .sv{color:var(--b2);}.g2b .sv{color:var(--g2);}
.o2b .sv{color:var(--o2);}.w2b .sv{color:var(--w2);}.y2b .sv{color:var(--y2);}
.smid{text-align:center;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:2;}
.smidv{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--muted);display:block;}

/* ══ STATUS ══ */
.stbar{border:1.5px solid var(--border);border-radius:var(--rad);background:var(--surface);padding:9px 13px;text-align:center;font-size:13px;min-height:42px;display:flex;align-items:center;justify-content:center;margin-bottom:.75rem;line-height:1.5;transition:border-color .2s,background .2s;}
.stbar.ra{border-color:var(--r-m);background:var(--r-l);}.stbar.ba{border-color:var(--b-m);background:var(--b-l);}
.stbar.ga{border-color:var(--g-m);background:var(--g-l);}.stbar.oa{border-color:var(--o-m);background:var(--o-l);}
.stbar.wa{border-color:var(--w-m);background:var(--w-l);}.stbar.ya{border-color:var(--y-m);background:var(--y-l);}
.stbar.r2a{border-color:var(--r2-m);background:var(--r2-l);}.stbar.b2a{border-color:var(--b2-m);background:var(--b2-l);}
.stbar.g2a{border-color:var(--g2-m);background:var(--g2-l);}.stbar.think{background:var(--faint);}
.tc{font-weight:600;}
.cr{color:var(--r-d);}.cb{color:var(--b-d);}.cg{color:var(--g-d);}
.co{color:var(--o-d);}.cw{color:var(--w-d);}.cy{color:var(--y-d);}
.nopwr{color:var(--muted);font-size:11px;font-style:italic;}
.haspwr{font-size:11px;font-style:italic;}

/* ══ BOARD ══ */
.board-wrap{position:relative;}
.board{display:grid;grid-template-columns:repeat(4,var(--cell));gap:var(--gap);margin:0 auto .5rem;width:fit-content;padding:10px;background:var(--border);border-radius:10px;box-shadow:var(--glow);}
[data-theme="dark"] .board{background:#2a2520;}
/* Animation overlay canvas */
#anim-canvas{position:absolute;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:50;}

.cell{width:var(--cell);height:var(--cell);background:var(--surface);border-radius:4px;cursor:pointer;font-family:'DM Serif Display',serif;font-size:2.3rem;display:flex;align-items:center;justify-content:center;transition:background .12s,transform .08s,box-shadow .12s;user-select:none;position:relative;overflow:visible;}
.cell:hover:not(.taken){background:var(--faint);transform:scale(1.03);}.cell.taken{cursor:default;}
.cell.rp{color:var(--r);background:var(--r-l);}.cell.bp{color:var(--b);background:var(--b-l);}
.cell.gp{color:var(--g);background:var(--g-l);}.cell.op{color:var(--o);background:var(--o-l);}
.cell.wp{color:var(--w);background:var(--w-l);}.cell.yp{color:var(--y);background:var(--y-l);}
.cell.r2p{color:var(--r2);background:var(--r2-l);box-shadow:inset 0 0 0 2.5px var(--r2-m);}
.cell.b2p{color:var(--b2);background:var(--b2-l);box-shadow:inset 0 0 0 2.5px var(--b2-m);}
.cell.g2p{color:var(--g2);background:var(--g2-l);box-shadow:inset 0 0 0 2.5px var(--g2-m);}
.cell.o2p{color:var(--o2);background:var(--o2-l);box-shadow:inset 0 0 0 2.5px var(--o2-m);}
.cell.w2p{color:var(--w2);background:var(--w2-l);box-shadow:inset 0 0 0 2.5px var(--w2-m);}
.cell.y2p{color:var(--y2);background:var(--y2-l);box-shadow:inset 0 0 0 2.5px var(--y2-m);}
.cell.win.rp{box-shadow:0 0 0 2px var(--r);background:var(--r-m);}
.cell.win.bp{box-shadow:0 0 0 2px var(--b);background:var(--b-m);}
.cell.win.gp{box-shadow:0 0 0 2px var(--g);background:var(--g-m);}
.cell.win.op{box-shadow:0 0 0 2px var(--o);background:var(--o-m);}
.cell.win.wp{box-shadow:0 0 0 2px var(--w);background:var(--w-m);}
.cell.win.yp{box-shadow:0 0 0 2px var(--y);background:var(--y-m);}
.cell.win.r2p{box-shadow:0 0 0 2px var(--r2);background:var(--r2-m);}
.cell.win.b2p{box-shadow:0 0 0 2px var(--b2);background:var(--b2-m);}
.cell.win.g2p{box-shadow:0 0 0 2px var(--g2);background:var(--g2-m);}
/* Highlights */
.cell.hlr{background:var(--r-l);box-shadow:0 0 0 2px var(--r);cursor:pointer;animation:br 1.2s ease-in-out infinite;}.cell.hlr:hover{background:var(--r-m);}
.cell.hlb{background:var(--b-l);box-shadow:0 0 0 2px var(--b);cursor:pointer;animation:bb 1.2s ease-in-out infinite;}.cell.hlb:hover{background:var(--b-m);}
.cell.hlg{background:var(--g-l);box-shadow:0 0 0 2px var(--g);cursor:pointer;animation:bg 1.2s ease-in-out infinite;}.cell.hlg:hover{background:var(--g-m);}
.cell.hlo{background:var(--o-l);box-shadow:0 0 0 2px var(--o);cursor:pointer;animation:bo 1.2s ease-in-out infinite;}.cell.hlo:hover{background:var(--o-m);}
.cell.hlw{background:var(--w-l);box-shadow:0 0 0 2px var(--w);cursor:pointer;animation:bw 1.2s ease-in-out infinite;}.cell.hlw:hover{background:var(--w-m);}
.cell.hly{background:var(--y-l);box-shadow:0 0 0 2px var(--y);cursor:pointer;animation:by 1.2s ease-in-out infinite;}.cell.hly:hover{background:var(--y-m);}
@keyframes br{0%,100%{box-shadow:0 0 0 2px var(--r)}50%{box-shadow:0 0 0 4px var(--r-m)}}
@keyframes bb{0%,100%{box-shadow:0 0 0 2px var(--b)}50%{box-shadow:0 0 0 4px var(--b-m)}}
@keyframes bg{0%,100%{box-shadow:0 0 0 2px var(--g)}50%{box-shadow:0 0 0 4px var(--g-m)}}
@keyframes bo{0%,100%{box-shadow:0 0 0 2px var(--o)}50%{box-shadow:0 0 0 4px var(--o-m)}}
@keyframes bw{0%,100%{box-shadow:0 0 0 2px var(--w)}50%{box-shadow:0 0 0 4px var(--w-m)}}
@keyframes by{0%,100%{box-shadow:0 0 0 2px var(--y)}50%{box-shadow:0 0 0 4px var(--y-m)}}

/* ══ POISON — 6 STAGES, rising from bottom ══ */
/* Stage 6=just poisoned (brightest, tallest at end), 1=dying */
.cell .poison-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 4px 4px;pointer-events:none;z-index:1;}
/* Stage counts: 6→faint bottom sliver, 1→full cell */
.cell.ps6 .poison-fill{height:8%;background:rgba(139,92,246,.18);}
.cell.ps5 .poison-fill{height:28%;background:rgba(124,58,237,.25);}
.cell.ps4 .poison-fill{height:50%;background:rgba(109,40,217,.32);animation:pwave 1.2s ease-in-out infinite;}
.cell.ps3 .poison-fill{height:68%;background:rgba(91,33,182,.40);animation:pwave 1s ease-in-out infinite;}
.cell.ps2 .poison-fill{height:84%;background:rgba(76,29,149,.50);animation:pwave .9s ease-in-out infinite;}
.cell.ps1 .poison-fill{height:100%;border-radius:4px;background:rgba(60,22,120,.60);animation:pblink .5s ease-in-out infinite;}
@keyframes pwave{0%,100%{transform:scaleX(1) scaleY(1);}50%{transform:scaleX(1.03) scaleY(1.02);}}
@keyframes pblink{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ══ FRUIT DOTS ══ */
.fdot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none;}
.fdot::after{content:'';width:20px;height:20px;border-radius:50%;display:block;box-shadow:0 1px 4px rgba(0,0,0,.18);}
.fdot.f0::after{background:radial-gradient(circle at 36% 30%,#6abf69 0%,#1e7a4a 60%,#0f4a2a 100%);}
.fdot.f1::after{background:radial-gradient(circle at 36% 30%,#5cbd8a 0%,#0a3d1e 60%,#051a0d 100%);}

/* ══ QUANTUM GHOST ══ */
.qgh{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;font-family:'DM Serif Display',serif;font-size:1.4rem;border-radius:4px;}

/* ══ MOLE BURROW ARROWS ══ */
.mole-arrows{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10;}
.mole-arrows svg{width:70%;height:70%;opacity:.7;}

/* ══ LEGEND ══ */
.legstrip{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:.7rem;}
.lc{border:1px solid var(--border);border-radius:var(--rad);padding:7px 9px;background:var(--surface);font-size:10.5px;color:var(--muted);line-height:1.45;box-shadow:var(--glow);}
.lc strong{display:block;font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:2px;}
.lc.rl{border-color:var(--r-m);}.lc.rl strong{color:var(--r);}
.lc.bl{border-color:var(--b-m);}.lc.bl strong{color:var(--b);}
.lc.gl{border-color:var(--g-m);}.lc.gl strong{color:var(--g);}
.lc.ol{border-color:var(--o-m);}.lc.ol strong{color:var(--o);}
.lc.wl{border-color:var(--w-m);}.lc.wl strong{color:var(--w);}
.lc.yl{border-color:var(--y-m);}.lc.yl strong{color:var(--y);}
.lc.r2l{border-color:var(--r2-m);}.lc.r2l strong{color:var(--r2);}
.game-cancel-note{font-size:11px;color:var(--muted);padding:7px 10px;border:1px solid var(--border);border-radius:var(--rad);background:var(--surface);margin-bottom:.7rem;line-height:1.5;display:none;}
.game-cancel-note.show{display:block;}
.game-cancel-note strong{font-weight:600;color:var(--text);}
.actions{display:flex;gap:8px;justify-content:center;margin-top:.3rem;}
.abtn{padding:8px 20px;border:1.5px solid var(--border);border-radius:var(--rad);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;}
.abtn:hover{border-color:var(--text);color:var(--text);}
.abtn.pri{background:var(--text);color:var(--bg);border-color:var(--text);}.abtn.pri:hover{opacity:.85;color:var(--bg);}
.back{text-align:center;margin-top:.9rem;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.back:hover{color:var(--text);}
@media(max-width:520px){:root{--cell:70px;}.select-grid{gap:.9rem .5rem;}}
</style>
</head>
<body>

<!-- TOP-LEFT -->
<div id="top-left">
  <button id="site-back" onclick="goToSite()">Tommy / Salune</button>
  <!-- Speaker icon: shows X by default (muted) -->

<!-- VOL PANEL -->

<div id="ambient"></div>

<div class="page-wrap">
  <!-- LEFT SIDEBAR (desktop only) -->
  <div id="side-left">

  </div>

  <div style="width:100%;max-width:580px;position:relative;z-index:1;" id="center-col">

          <div class="cancel-note"><strong>Nemesis mode:</strong> Both players have no powers every other turn, starting on turn 1.</div>
        </div>

      <!-- GAME -->
      <div class="screen" id="scr-game">
        <div class="scoreboard" id="mob-scoreboard">
          <div class="sbox rb" id="sb0"><div class="ghost" id="gh0">X</div><div class="shn" id="sn0"></div><div class="sv" id="sv0">0</div></div>
          <div class="smid">draws<span class="smidv" id="svd">0</span></div>
          <div class="sbox bb" id="sb1"><div class="ghost" id="gh1">O</div><div class="shn" id="sn1"></div><div class="sv" id="sv1">0</div></div>

<script>
// ══════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════
const THEME_KEY='rivalsTheme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem(THEME_KEY,t);
  const isDark=t==='dark';
  document.getElementById('sun-icon').style.display=isDark?'none':'';
  ['sun-ray1','sun-ray2','sun-ray3','sun-ray4'].forEach(id=>document.getElementById(id).style.display=isDark?'none':'');
  document.getElementById('moon-icon').style.display=isDark?'':'none';
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  applyTheme(cur==='dark'?'light':'dark');
}
// Load saved theme (default: light, no geolocation)
(()=>{const saved=localStorage.getItem(THEME_KEY);applyTheme(saved||'light');})();

// ══════════════════════════════════════════════════════
// MUSIC SYSTEM
// ══════════════════════════════════════════════════════
const AUDIO_BASE='https://salunesoftware.github.io/';
const TRACK_FILES={base:'RivalBaseTrack01',X:'RivalXTrack01',O:'RivalOTrack01',S:'RivalSTrack01',M:'RivalMTrack01',Q:'RivalQTrack01',F:'RivalFTrack01'};
const audioEls={};const trackTargets={};
let musicStarted=false,musicMuted=false,masterVol=0.5;
const CHAR_TRACK_KEY=['X','O','S','M','Q','F',null];

function sCurve(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function fadeTo(key,target,ms=2000){
  trackTargets[key]=target;
  const el=audioEls[key];if(!el)return;
  const scaled=musicMuted?0:target*masterVol;
  const start=el.volume,diff=scaled-start;
  if(Math.abs(diff)<.001){el.volume=scaled;if(scaled===0)el.pause();return;}
  const steps=40,iv=ms/steps;let n=0;
  clearInterval(el._ft);
  el._ft=setInterval(()=>{
    n++;el.volume=Math.max(0,Math.min(1,start+diff*sCurve(n/steps)));
    if(n>=steps){clearInterval(el._ft);el.volume=scaled;if(scaled===0)el.pause();}
  },iv);
  if(scaled>0&&el.paused)el.play().catch(()=>{});
}

function startMusicManually(){
  if(musicStarted)return;
  musicStarted=true;
  const keys=Object.keys(TRACK_FILES);
  const ready=[];
  keys.forEach(k=>{
    const a=new Audio(AUDIO_BASE+TRACK_FILES[k]+'.mp3');
    a.loop=true;a.volume=0;a.preload='auto';
    audioEls[k]=a;trackTargets[k]=0;
    ready.push(new Promise(res=>{
      a.addEventListener('canplaythrough',res,{once:true});
      a.addEventListener('error',res,{once:true});
      a.load();
    }));
  });
  Promise.all(ready).then(()=>{
    const offset=audioEls.base?.currentTime||0;
    keys.forEach(k=>{if(audioEls[k])audioEls[k].currentTime=0;});
    keys.forEach(k=>{if(audioEls[k])audioEls[k].play().catch(()=>{});});
    // Base track only for ~10s, then char tracks
    fadeTo('base',1,2000);
    setTimeout(()=>{onCharSelect();},10000);
  });
  updateSpeakerIcon();
  document.getElementById('music-enable-btn').style.display='none';
}

function onCharSelect(){
  if(!musicStarted)return;
  const active=new Set(['base']);
  for(let s=0;s<2;s++){const k=CHAR_TRACK_KEY[SI[s]];if(k)active.add(k);}
  Object.keys(TRACK_FILES).forEach(k=>{
    if(k==='base')return;
    if(active.has(k))fadeTo(k,1,1500);else fadeTo(k,0,1500);
  });
}
function onGameStart(){if(!musicStarted)return;setTimeout(()=>Object.keys(TRACK_FILES).forEach(k=>fadeTo(k,1,2000)),1500);}
function onGameEnd(){if(!musicStarted)return;onCharSelect();}
function goToSite(){
  if(musicStarted)Object.keys(TRACK_FILES).forEach(k=>fadeTo(k,0,2000));
  setTimeout(()=>window.location.href='https://salunesoftware.github.io/',2100);
}

function onSpeakerClick(){
  const panel=document.getElementById('vol-panel');
  const isOpen=panel.classList.contains('open');
  if(!musicStarted&&!isOpen){
    // First click: start music + open panel
    startMusicManually();
    panel.classList.add('open');
  } else if(musicStarted&&isOpen){
    panel.classList.remove('open');
  } else if(!isOpen){
    panel.classList.add('open');
    document.getElementById('music-enable-btn').style.display=musicStarted?'none':'block';
  } else {
    // Toggle mute if already started
    if(musicStarted){musicMuted=!musicMuted;applyMasterVol();}
    panel.classList.remove('open');
  }
  updateSpeakerIcon();
}
function toggleVolPanel(){
  const p=document.getElementById('vol-panel');
  p.classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#top-left')&&!e.target.closest('#vol-panel'))
    document.getElementById('vol-panel').classList.remove('open');
});
function onVolSlider(v){
  masterVol=parseFloat(v);
  if(!musicMuted)applyMasterVol();
  updateSpeakerIcon();
}
function applyMasterVol(){
  Object.keys(TRACK_FILES).forEach(k=>{
    const el=audioEls[k];if(!el)return;
    const t=trackTargets[k]||0;
    const scaled=musicMuted?0:t*masterVol;
    el.volume=Math.max(0,Math.min(1,scaled));
    if(!musicMuted&&scaled>0&&el.paused)el.play().catch(()=>{});
    if(musicMuted)el.pause();
  });
}
function updateSpeakerIcon(){
  const on=document.getElementById('spk-on');
  const off=document.getElementById('spk-off');
  const muted=!musicStarted||musicMuted||(masterVol<.02);
  if(on)on.style.display=muted?'none':'';
  if(off)off.style.display=muted?'':'none';
}

// ══════════════════════════════════════════════════════
// CHARACTERS
// ══════════════════════════════════════════════════════
const CH=[
  {id:'expunger',sym:'X',name:'The X-punger',pname:'X Marks the Spot',
   desc:'Eliminates 1 opponent tile within 8 directions of any of its own tiles.',
   t:'r',bc:'rb',pc:'rp',tc:'cr',lc:'rl',ac:'ra',alt:{bc:'r2b',pc:'r2p',tc:'cr2',lc:'r2l',ac:'r2a'}},
  {id:'original',sym:'O',name:'The Original',pname:'Mirror Cell',
   desc:'Clones itself into any empty square adjacent or diagonal to its newest tile.',
   t:'b',bc:'bb',pc:'bp',tc:'cb',lc:'bl',ac:'ba',alt:{bc:'b2b',pc:'b2p',tc:'cb2',lc:'b2l',ac:'b2a'}},
  {id:'snake',sym:'S',name:'The Snake',pname:'Venom Bloom',
   desc:'Poisons adjacent tiles on placement (6-turn decay). Eating own fruit grants a bonus placement that also poisons. Opponents eating snake fruit get poisoned.',
   t:'g',bc:'gb',pc:'gp',tc:'cg',lc:'gl',ac:'ga',alt:{bc:'g2b',pc:'g2p',tc:'cg2',lc:'g2l',ac:'g2a'}},
  {id:'mole',sym:'M',name:'The Mole',pname:'Burrow',
   desc:'Places only adjacent to existing tiles. Burrows through adjacent opponent tiles, emerging beyond them. Without adjacent opponents, burrows blind one tile further than chosen — random direction.',
   t:'w',bc:'wb',pc:'wp',tc:'cw',lc:'wl',ac:'wa',alt:{bc:'w2b',pc:'w2p',tc:'cw2',lc:'wl',ac:'w2a'}},
  {id:'quantum',sym:'Q',name:'The Quantum',pname:'Superposition',
   desc:'Most recent tile projects ghosts along its row and column. Opponent covering a ghost teleports that Q tile away. Placing on own ghost refreshes the projection — no teleport.',
   t:'y',bc:'yb',pc:'yp',tc:'cy',lc:'yl',ac:'ya',alt:{bc:'y2b',pc:'y2p',tc:'cy2',lc:'yl',ac:'y2a'}},
  {id:'factotum',sym:'F',name:'The Factotum',pname:'Wild Power',
   desc:'Gains a random power each turn. Placed tiles permanently retain their power. Snake fruit bonus also poisons on bonus placement.',
   t:'o',bc:'ob',pc:'op',tc:'co',lc:'ol',ac:'oa',alt:{bc:'o2b',pc:'o2p',tc:'co2',lc:'ol',ac:'o2a'}},
  {id:'random',sym:'?',name:'Random',pname:'',desc:'Picks a random character when the game starts.',
   t:'qt',bc:'bb',pc:'bp',tc:'cb',lc:'bl',ac:'ba',alt:{bc:'b2b',pc:'b2p',tc:'cb2',lc:'bl',ac:'b2a'}},
];
const REAL_CH=6;
const FACTOTUM_POOL=['expunger','original','snake','mole','quantum'];

// ══ BOARD HELPERS ══
const N=4,WINS=[];
for(let r=0;r<N;r++) WINS.push([r*N,r*N+1,r*N+2,r*N+3]);
for(let c=0;c<N;c++) WINS.push([c,c+N,c+2*N,c+3*N]);
WINS.push([0,5,10,15]);WINS.push([3,6,9,12]);
const adjO=i=>{const r=Math.floor(i/N),c=i%N,a=[];if(r>0)a.push(i-N);if(r<N-1)a.push(i+N);if(c>0)a.push(i-1);if(c<N-1)a.push(i+1);return a;};
const adjD=i=>{const r=Math.floor(i/N),c=i%N,a=[];if(r>0&&c>0)a.push(i-N-1);if(r>0&&c<N-1)a.push(i-N+1);if(r<N-1&&c>0)a.push(i+N-1);if(r<N-1&&c<N-1)a.push(i+N+1);return a;};
const adj8=i=>[...new Set([...adjO(i),...adjD(i)])];
const stepRC=(i,dr,dc)=>{const r=Math.floor(i/N)+dr,c=(i%N)+dc;return(r<0||r>=N||c<0||c>=N)?-1:r*N+c;};

// ══ SELECT STATE ══
let SI=[0,1],gMode='2p',diff='easy',botFirst=false;
let RSI=[0,1];
const rch=s=>CH[RSI[s]];
const sameChar=()=>RSI[0]===RSI[1];
const isAlt=s=>s===1&&sameChar();
const prop=(s,k)=>isAlt(s)?rch(s).alt[k]:rch(s)[k];
const sym=s=>isAlt(s)?rch(s).sym.toLowerCase():rch(s).sym;
const symSlot=v=>{const s0=sym(0),s1=sym(1);return v===s0?0:v===s1?1:-1;};
const botSlot=()=>gMode==='sp'?(botFirst?0:1):-1;
const isNemesis=()=>sameChar();
const cancelledOut=s=>isNemesis()&&(pTurnCnt[s]%2===1);
function playerLabel(s){if(gMode==='sp'&&s===botSlot())return'Bot';return s===0?'P1':'P2';}
function displayName(s){return rch(s).name+' ('+playerLabel(s)+')';}

// ══ FACTOTUM ══
let factTileData={},factPower=[null,null];
function rollFactPower(s){const id=FACTOTUM_POOL[Math.floor(Math.random()*FACTOTUM_POOL.length)];factPower[s]=id;return id;}
function effId(s){if(rch(s).id==='factotum')return factPower[s]||'expunger';return rch(s).id;}

// ══ QUANTUM STATE ══
// activeQTile[slot] = boardIdx of most recent Q tile (only one projects at a time)
let activeQTile=[-1,-1];
let qTilePerceived={}; // boardIdx → bool

function buildQuantumGhosts(){
  const map={};
  for(let s=0;s<2;s++){
    const qi=activeQTile[s];
    if(qi<0||board[qi]===null){activeQTile[s]=-1;continue;}
    if(qTilePerceived[qi])continue;
    const qr=Math.floor(qi/N),qc=qi%N;
    for(let cc=0;cc<N;cc++){const j=qr*N+cc;if(j!==qi&&board[j]===null)map[j]={slot:s,dist:Math.abs(cc-qc),qi};}
    for(let rr=0;rr<N;rr++){const j=rr*N+qc;if(j!==qi&&board[j]===null){const d=Math.abs(rr-qr);if(!map[j]||d<map[j].dist)map[j]={slot:s,dist:d,qi};}}
  }
  return map;
}
function ghostOpacity(d){return d===1?0.08:d===2?0.04:0.02;}
function teleportQTile(qi,slot){
  if(board[qi]===null)return;
  const v=sym(slot);
  const ghosts=buildQuantumGhosts();
  const cands=board.map((bv,j)=>bv===null&&!ghosts[j]?j:-1).filter(j=>j>=0);
  const pool=cands.length?cands:board.map((bv,j)=>bv===null?j:-1).filter(j=>j>=0);
  if(!pool.length)return;
  const dest=pool[Math.floor(Math.random()*pool.length)];
  board[qi]=null;delete qTilePerceived[qi];
  if(factTileData[qi]){factTileData[dest]=factTileData[qi];delete factTileData[qi];}
  board[dest]=v;
  activeQTile[slot]=dest;
  playQAnim(dest);
}
function checkQuantumTeleportByOpp(placingSlot,pos){
  const qs=1-placingSlot;
  if(rch(qs).id!=='quantum'&&!(rch(qs).id==='factotum'))return;
  const ghosts=buildQuantumGhosts();
  if(!ghosts[pos]||ghosts[pos].slot!==qs)return;
  const qi=ghosts[pos].qi;
  if(qTilePerceived[qi])return;
  qTilePerceived[qi]=true;
  teleportQTile(qi,qs);
}

function resetRound(){
  board=Array(N*N).fill(null);poison=Array(N*N).fill(0);fruit=Array(N*N).fill(0);
  lastP=[-1,-1];pTurnCnt=[0,0];factPower=[null,null];factTileData={};
  activeQTile=[-1,-1];qTilePerceived={};
  turnIdx=0;phase='place';over=false;botThink=false;bonusSlot=-1;moleExpecting=-1;moleFrom=-1;
  if(rch(0).id==='factotum')rollFactPower(0);
  if(rch(1).id==='factotum')rollFactPower(1);

// ══ FACT BANNER ══
function updateFactBanner(inGame){
  const fb=document.getElementById('fact-banner');
  if(inGame&&!over&&rch(turnIdx).id==='factotum'&&factPower[turnIdx]){
    const pc=CH.find(c=>c.id===factPower[turnIdx]);

  } else {fb.className='';fb.textContent='';}

// ══ SNAKE (6-stage poison) ══
function tickPoison(){
  for(let i=0;i<N*N;i++){
    if(poison[i]>0){
      poison[i]--;
      if(poison[i]===0){board[i]=null;delete qTilePerceived[i];}
    }
  }
}
function venomBloom(idx,s){
  if(cancelledOut(s))return;
  adjO(idx).forEach(j=>{if(board[j]!==null&&poison[j]===0)poison[j]=6;});
}
function countFruits(){return fruit.filter(Boolean).length;}
function spawnFruitFor(s){
  if(countFruits()>=3)return;
  const emp=board.map((v,i)=>(v===null&&fruit[i]===0)?i:-1).filter(i=>i>=0);
  if(!emp.length)return;fruit[emp[Math.floor(Math.random()*emp.length)]]=s+1;
}
function canEatFruit(s,i){return fruit[i]===s+1;}
function canEatOppFruit(s,i){return fruit[i]>0&&fruit[i]!==s+1;}

// ══ MOLE ══
function moleValidPlacements(s){
  const v=sym(s),hasM=board.some(bv=>bv===v);
  if(!hasM)return board.map((bv,i)=>bv===null?i:-1).filter(i=>i>=0);
  const seen=new Set();board.forEach((bv,i)=>{if(bv===v)adjO(i).forEach(j=>{if(board[j]===null)seen.add(j);});});return[...seen];
}
function moleAdjOppTargets(s){
  const ov=sym(1-s);if(moleFrom<0)return[];return adjO(moleFrom).filter(i=>board[i]===ov);
}
function moleBlindTargets(s){
  if(moleFrom<0)return[];return adjO(moleFrom).filter(i=>board[i]===null);
}
// Get three possible exit directions from a blind-burrow chosen tile
function moleBlindExits(chosen){
  const dr=Math.floor(chosen/N)-Math.floor(moleFrom/N);
  const dc=(chosen%N)-(moleFrom%N);
  const dirs=[{dr,dc},{dr:-dc,dc:dr},{dr:dc,dc:-dr}];
  return dirs.map(({dr:d2,dc:c2})=>{
    const n=stepRC(chosen,d2,c2);return n>=0?n:-1;
  });
}
function moleDoBurrow(s,clicked,isBlind){
  const v=sym(s);
  if(!isBlind){
    // Normal burrow: replace opp tile, emerge beyond
    const dr=Math.floor(clicked/N)-Math.floor(moleFrom/N);
    const dc=(clicked%N)-(moleFrom%N);
    board[clicked]=v;
    const opts=[{dr,dc},{dr:-dc,dc:dr},{dr:dc,dc:-dr}].map(({dr:d2,dc:c2})=>{
      const n=stepRC(clicked,d2,c2);return(n>=0&&board[n]!==v)?n:-1;
    });
    const rn=Math.random();
    const t=rn<1/3?opts[0]:rn<2/3?(opts[1]>=0?opts[1]:opts[0]):(opts[2]>=0?opts[2]:opts[0]);
    if(t>=0&&board[t]===null)board[t]=v;
    playMoleAnim(moleFrom,clicked,t>=0?t:-1);
  } else {
    // Blind burrow: chosen tile is SKIPPED, emerge one step further
    const exits=moleBlindExits(clicked).filter(e=>e>=0&&board[e]===null);
    let landing=-1;
    if(exits.length>0){
      landing=exits[Math.floor(Math.random()*exits.length)];
      board[landing]=v;
    }
    playMoleAnim(moleFrom,clicked,landing,true);
  }
}

// ══ WIN/DRAW ══
function chkWin(s){const v=sym(s);return WINS.find(w=>w.every(i=>board[i]===v))||null;}
function chkDraw(){return board.every(v=>v!==null);}

// ══ POWER TARGETS ══
function getPwrTargets(s){
  const eid=effId(s);if(cancelledOut(s))return[];
  if(eid==='expunger'){const ms=sym(s),os=sym(1-s),seen=new Set();board.forEach((v,i)=>{if(v===ms)adj8(i).forEach(j=>{if(board[j]===os)seen.add(j);});});return[...seen];}
  if(eid==='original'){const lp=lastP[s];if(lp<0)return[];const seen=new Set();adj8(lp).forEach(j=>{if(board[j]===null)seen.add(j);});return[...seen];}
  if(eid==='mole'){const opp=moleAdjOppTargets(s);return opp.length?opp:moleBlindTargets(s);}
  return[];
}

// ══ PLACE ══
function doPlace(i,s,isBonus){
  const v=sym(s),eid=effId(s);
  const isSnake=eid==='snake',isQ=eid==='quantum',isFact=rch(s).id==='factotum';

  // Q: check own ghost before placing
  let onOwnGhost=false;
  if(isQ){const gm=buildQuantumGhosts();if(gm[i]&&gm[i].slot===s)onOwnGhost=true;}

  board[i]=v;
  const ownFruit=canEatFruit(s,i);
  const oppFruit=canEatOppFruit(s,i);
  fruit[i]=0;lastP[s]=i;

  if(isFact&&factPower[s])factTileData[i]={id:factPower[s],sym:CH.find(c=>c.id===factPower[s])?.sym||'F'};

  // Q: register
  if(isQ){
    if(onOwnGhost){
      // Clear old projection — mark old active Q as perceived
      const old=activeQTile[s];
      if(old>=0&&old!==i)qTilePerceived[old]=true;
    } else {
      // Mark previous active as perceived (only newest projects)
      const old=activeQTile[s];
      if(old>=0&&old!==i)qTilePerceived[old]=true;
    }
    activeQTile[s]=i;
    qTilePerceived[i]=false;
    playQAnim(i);
  }

  // Venom
  const snakeActive=isSnake||(isFact&&factPower[s]==='snake');
  if(snakeActive)venomBloom(i,s);

  // Opp fruit → poison eater
  if(oppFruit){poison[i]=6;}

  const win=chkWin(s);
  if(win){renderBoard();markWin(win);endGame(s);return;}
  if(chkDraw()){renderBoard();endGame(-1);return;}

  // Fruit bonus (snake eats own fruit, or factotum-as-snake)
  if(ownFruit&&snakeActive&&!isBonus&&!cancelledOut(s)){
    renderBoard();
    const st=document.getElementById('stbar');
    st.className='stbar '+prop(s,'ac');
    st.innerHTML=`<span class="tc ${prop(s,'tc')}">${displayName(s)}</span> &mdash; fruit! Place one more tile.`;
    bonusSlot=s;phase='bonus';
    if(isBot())setTimeout(()=>doBotBonus(s),400);
    return;
  }
  if(isBonus){finishAfterBonus(s);return;}
  gotopower(s);
}

function gotopower(s){
  const eid=effId(s);
  if(eid==='mole'&&!cancelledOut(s)){
    const tgts=getPwrTargets(s);
    if(tgts.length>0){moleExpecting=s;phase='power';renderBoard();setStatus();if(isBot())setTimeout(doBot,350);return;}
  }
  phase='power';const tgts=getPwrTargets(s);renderBoard();setStatus();
  if(tgts.length===0)autoAdvance(s);else if(isBot())setTimeout(doBot,350);
}
function finishAfterBonus(s){
  const eid=effId(s);
  if(eid==='mole'&&!cancelledOut(s)){
    const tgts=getPwrTargets(s);
    if(tgts.length>0){moleExpecting=s;phase='power';renderBoard();setStatus();if(isBot())setTimeout(doBot,350);return;}
  }
  phase='power';const tgts=getPwrTargets(s);renderBoard();setStatus();
  if(tgts.length===0)autoAdvance(s);else if(isBot())setTimeout(doBot,350);
}

function doPwr(i,s){
  const eid=effId(s);
  if(eid==='expunger'){
    board[i]=null;poison[i]=0;delete qTilePerceived[i];
    playExpungerAnim(i,s,()=>advanceTurn());
    return;
  }
  if(eid==='original'){
    board[i]=sym(s);
    checkQuantumTeleportByOpp(s,i);
    playOriginalAnim(lastP[s],i,s,()=>{
      const win=chkWin(s);if(win){renderBoard();markWin(win);endGame(s);return;}advanceTurn();
    });
    return;
  }
  if(eid==='mole'){
    moleExpecting=-1;
    const isBlind=moleAdjOppTargets(s).length===0;
    moleDoBurrow(s,i,isBlind);
    const win=chkWin(s);if(win){renderBoard();markWin(win);endGame(s);return;}
    if(chkDraw()){renderBoard();endGame(-1);return;}advanceTurn();
  }
}

function autoAdvance(s){
  const eid=effId(s);
  if(['snake','quantum','factotum'].includes(eid)){advanceTurn();return;}
  const msgs={expunger:'No targets.',original:'No room.',mole:'No tiles to burrow.'};
  if(!msgs[eid]){advanceTurn();return;}
  const st=document.getElementById('stbar');st.className='stbar';
  st.innerHTML=`<span class="tc ${prop(s,'tc')}">${displayName(s)}</span> &mdash; ${msgs[eid]}`;
  setTimeout(advanceTurn,600);
}

function advanceTurn(){
  const next=1-turnIdx;
  if(effId(next)==='snake'){tickPoison();const w=chkWin(next);if(w){renderBoard();markWin(w);endGame(next);return;}}
  if(chkDraw()){renderBoard();endGame(-1);return;}
  const ceid=effId(turnIdx);
  if(ceid==='snake'&&!cancelledOut(turnIdx))spawnFruitFor(turnIdx);
  if(rch(turnIdx).id==='factotum'&&factPower[turnIdx]==='snake'&&!cancelledOut(turnIdx))spawnFruitFor(turnIdx);
  moleExpecting=-1;moleFrom=-1;turnIdx=next;phase='place';bonusSlot=-1;
  if(rch(next).id==='factotum')rollFactPower(next);
  updateFactBanner(true);renderBoard();setStatus();
  if(isBot())setTimeout(doBot,400);
}

function endGame(ws){
  over=true;updateFactBanner(false);
  const st=document.getElementById('stbar');
  if(ws===-1){st.className='stbar';st.textContent='Draw.';scores[2]++;}
  else{st.className='stbar '+prop(ws,'ac');st.innerHTML=`<span class="tc ${prop(ws,'tc')}">${displayName(ws)} wins.</span>`;scores[ws]++;}
  updateScoreDisplay();onGameEnd();
}

// ══ HUMAN CLICK ══
function handleClick(i){
  if(over||botThink||isBot())return;
  if(phase==='place'){
    if(rch(turnIdx).id==='mole'&&!moleValidPlacements(turnIdx).includes(i))return;
    if(board[i]!==null)return;
    pTurnCnt[turnIdx]++;moleFrom=i;doPlace(i,turnIdx,false);
  } else if(phase==='bonus'){
    if(board[i]!==null)return;
    // Bonus tile: has its own venom if snake, no factotum power
    const s=bonusSlot,v=sym(s),eid=effId(s);
    board[i]=v;lastP[s]=i;
    if(eid==='snake'||(rch(s).id==='factotum'&&factPower[s]==='snake'))venomBloom(i,s);
    const win=chkWin(s);if(win){renderBoard();markWin(win);endGame(s);return;}
    if(chkDraw()){renderBoard();endGame(-1);return;}
    bonusSlot=-1;fruit[i]=0;
    finishAfterBonus(s);
  } else if(phase==='power'){
    if(moleExpecting>=0){if(!getPwrTargets(moleExpecting).includes(i))return;doPwr(i,moleExpecting);}
    else{
      if(!getPwrTargets(turnIdx).includes(i))return;
      if(effId(turnIdx)==='original')checkQuantumTeleportByOpp(turnIdx,i);
      doPwr(i,turnIdx);
    }
  }
}

// ══ STATUS ══
function setStatus(){
  if(over)return;
  const st=document.getElementById('stbar');
  if(botThink){st.className='stbar think';st.textContent='Bot is thinking...';return;}
  const co=cancelledOut(turnIdx);
  st.className='stbar '+prop(turnIdx,'ac');
  if(phase==='place'){
    let msg=`<span class="tc ${prop(turnIdx,'tc')}">${displayName(turnIdx)}</span> &mdash; place your piece`;
    if(isNemesis()){if(co)msg+=` &nbsp;<span class="nopwr">— no power this turn</span>`;else msg+=` &nbsp;<span class="haspwr" style="color:var(--muted)">(power unlocked)</span>`;}
    st.innerHTML=msg;
  } else if(phase==='bonus'){
    st.innerHTML=`<span class="tc ${prop(turnIdx,'tc')}">${displayName(turnIdx)}</span> &mdash; fruit bonus! Place one more tile.`;
  } else if(phase==='power'){
    const eid=effId(moleExpecting>=0?moleExpecting:turnIdx);
    const isBlind=eid==='mole'&&moleAdjOppTargets(moleExpecting>=0?moleExpecting:turnIdx).length===0;
    if(moleExpecting>=0)st.innerHTML=`<span class="tc ${prop(turnIdx,'tc')}">${displayName(turnIdx)}: ${isBlind?'Blind Burrow':'Burrow'}</span> &mdash; choose a tile`;
    else st.innerHTML=`<span class="tc ${prop(turnIdx,'tc')}">${displayName(turnIdx)}: ${rch(turnIdx).pname}</span> &mdash; choose a target`;
  }
}

// ══ RENDER ══
function renderBoard(){
  const cells=document.getElementById('board').querySelectorAll('.cell');
  const showPwr=!over&&!botThink&&phase==='power';
  const eid=effId(turnIdx);
  const hlMap={expunger:'hlr',original:'hlb',snake:'hlg',factotum:'hlo',mole:'hlw',quantum:'hly'};
  const hlCls=hlMap[eid]||'hlr';
  const activeSlot=moleExpecting>=0?moleExpecting:turnIdx;
  const tgts=showPwr?getPwrTargets(activeSlot):[];
  const isBlindBurrow=showPwr&&eid==='mole'&&moleAdjOppTargets(activeSlot).length===0;
  const qGhosts=buildQuantumGhosts();

  cells.forEach((cell,i)=>{
    cell.className='cell';cell.innerHTML='';cell.style.background='';cell.style.boxShadow='';

    // Quantum ghost
    if(!board[i]&&qGhosts[i]&&!tgts.includes(i)){
      const op=ghostOpacity(qGhosts[i].dist);
      cell.style.background=`rgba(184,144,0,${(op*.5).toFixed(3)})`;
      cell.style.boxShadow=`inset 0 0 0 1px rgba(184,144,0,${op.toFixed(3)})`;
      const dot=document.createElement('div');dot.className='qgh';
      dot.style.color=`rgba(184,144,0,${op.toFixed(3)})`;dot.textContent='Q';cell.appendChild(dot);
    }

    // Fruit
    if(fruit[i]&&!board[i]){
      cell.classList.add('fruit-empty');
      const fd=document.createElement('div');fd.className='fdot f'+(fruit[i]-1);cell.appendChild(fd);
    }

    if(board[i]!==null){
      const s=symSlot(board[i]);
      if(s>=0)cell.classList.add('taken',prop(s,'pc'));
      let disp=board[i].toUpperCase();
      if(s>=0&&rch(s).id==='factotum'){const td=factTileData[i];if(td)disp=td.sym;else if(factPower[s]){const pc=CH.find(c=>c.id===factPower[s]);if(pc)disp=pc.sym;}}
      cell.textContent=disp;
      // Poison overlay
      if(poison[i]>0){
        const pDiv=document.createElement('div');pDiv.className='poison-fill';cell.appendChild(pDiv);
        cell.classList.add('ps'+Math.max(1,Math.min(6,poison[i])));
      }
    }

    if(tgts.includes(i)){
      cell.style.background='';cell.style.boxShadow='';cell.classList.add(hlCls);
      if(!board[i])cell.classList.remove('taken');
      // Mole blind burrow arrows
      if(isBlindBurrow&&board[i]===null){
        const exits=moleBlindExits(i);
        const arrowDiv=document.createElement('div');arrowDiv.className='mole-arrows';
        const svgNS='http://www.w3.org/2000/svg';
        const svg=document.createElementNS(svgNS,'svg');svg.setAttribute('viewBox','-1 -1 2 2');
        // 3 arrows pointing outward
        const dirs=exits.filter(e=>e>=0);
        const angles=[];
        exits.forEach((e,idx)=>{
          if(e<0)return;
          const dr=Math.floor(e/N)-Math.floor(i/N),dc=(e%N)-(i%N);
          const a=Math.atan2(dr,dc);angles.push(a);
          const g=document.createElementNS(svgNS,'g');
          g.setAttribute('transform',`rotate(${a*180/Math.PI},0,0)`);
          const arr=document.createElementNS(svgNS,'polygon');
          arr.setAttribute('points','0.5,-0.15 0.5,0.15 0.85,0');
          arr.setAttribute('fill','var(--w)');arr.setAttribute('opacity','0.85');
          g.appendChild(arr);svg.appendChild(g);
        });
        arrowDiv.appendChild(svg);cell.appendChild(arrowDiv);
      }
    }
  });
}
function markWin(win){const cells=document.getElementById('board').querySelectorAll('.cell');win.forEach(i=>cells[i].classList.add('win'));}

// ══ ANIMATION SYSTEM ══
const canvas=document.getElementById('anim-canvas');
const ctx=canvas.getContext('2d');
const anims=[];
let animFrame=null;

function getCellCenter(idx){
  const el=document.getElementById('board');
  const cells=el.querySelectorAll('.cell');
  const c=cells[idx];const cr=c.getBoundingClientRect(),br=el.getBoundingClientRect();
  return{x:cr.left-br.left+cr.width/2,y:cr.top-br.top+cr.height/2,w:cr.width,h:cr.height};
}
function runAnims(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const now=performance.now();
  for(let i=anims.length-1;i>=0;i--){
    const a=anims[i];
    const t=Math.min(1,(now-a.start)/a.dur);
    a.draw(ctx,t);
    if(t>=1){if(a.done)a.done();anims.splice(i,1);}
  }
  if(anims.length>0)animFrame=requestAnimationFrame(runAnims);
  else{animFrame=null;ctx.clearRect(0,0,canvas.width,canvas.height);}
}
function addAnim(dur,draw,done=null){
  anims.push({start:performance.now(),dur,draw,done});
  if(!animFrame)animFrame=requestAnimationFrame(runAnims);
}

function ease(t){return t<.5?2*t*t:1-(2*(1-t))*(2*(1-t))*2/4+1;}// easeInOut approx

// ── X-PUNGER: slash X ──
function playExpungerAnim(idx,s,done){
  renderBoard();
  const c=getCellCenter(idx);
  const clr=getComputedStyle(document.documentElement).getPropertyValue('--r').trim();
  addAnim(500,( ctx2,t)=>{
    const e=ease(Math.min(1,t*2));const fade=t>.6?1-(t-.6)/.4:1;
    ctx2.strokeStyle=`rgba(192,57,43,${fade*.9})`;ctx2.lineWidth=5;ctx2.lineCap='round';
    const hs=c.w*.35;
    ctx2.beginPath();ctx2.moveTo(c.x-hs*e,c.y-hs*e);ctx2.lineTo(c.x+hs*e,c.y+hs*e);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(c.x+hs*e,c.y-hs*e);ctx2.lineTo(c.x-hs*e,c.y+hs*e);ctx2.stroke();
  },done);
}

// ── ORIGINAL: mitosis swoop ──
function playOriginalAnim(srcIdx,destIdx,s,done){
  renderBoard();
  const src=getCellCenter(srcIdx);const dst=getCellCenter(destIdx);
  const clr='var(--b)';
  addAnim(600,(ctx2,t)=>{
    const e=ease(t);
    // Draw swooping O from src to dest
    const mx=(src.x+dst.x)/2+(dst.y-src.y)*.3;
    const my=(src.y+dst.y)/2-(dst.x-src.x)*.3;
    const bx=src.x+(mx-src.x)*e*2>src.x+(dst.x-src.x)*e?dst.x:src.x+(mx-src.x)*t;
    // Simple bezier approximation
    const btt=e;
    const px=src.x*(1-btt)*(1-btt)+mx*2*btt*(1-btt)+dst.x*btt*btt;
    const py=src.y*(1-btt)*(1-btt)+my*2*btt*(1-btt)+dst.y*btt*btt;
    const r=src.w*.2*(1-t*.5);
    ctx2.strokeStyle=`rgba(26,95,168,${0.8*(1-t*.3)})`;ctx2.lineWidth=3;
    ctx2.beginPath();ctx2.arc(px,py,r,0,Math.PI*2);ctx2.stroke();
  },done);
}

// ── QUANTUM: glitch blink ──
function playQAnim(idx){
  const c=getCellCenter(idx);
  addAnim(400,(ctx2,t)=>{
    const flicker=Math.sin(t*Math.PI*12)>.3?1:0;
    if(flicker){
      ctx2.fillStyle=`rgba(184,144,0,${.4*(1-t)})`;
      ctx2.fillRect(c.x-c.w*.4,c.y-c.h*.4,c.w*.8,c.h*.8);
    }
  });
}

// ── MOLE: underground line + dirt cloud ──
function playMoleAnim(fromIdx,throughIdx,landIdx,isBlind=false){
  const from=getCellCenter(fromIdx);
  const through=getCellCenter(throughIdx);
  const land=landIdx>=0?getCellCenter(landIdx):null;
  addAnim(700,(ctx2,t)=>{
    const e=ease(t);
    // Underground dotted line from→through
    ctx2.strokeStyle=`rgba(107,62,30,${.7*(1-t*.3)})`;ctx2.lineWidth=3;ctx2.setLineDash([6,4]);
    ctx2.beginPath();ctx2.moveTo(from.x,from.y);ctx2.lineTo(through.x*(e*1.2<1?e*1.2:1)+(from.x*(1-Math.min(1,e*1.2))),through.y*(e*1.2<1?e*1.2:1)+(from.y*(1-Math.min(1,e*1.2))));ctx2.stroke();
    ctx2.setLineDash([]);
    if(land&&t>.5){
      const lt=(t-.5)/.5;const le=ease(lt);
      // Line from through to land
      ctx2.strokeStyle=`rgba(107,62,30,${.7*lt})`;ctx2.lineWidth=3;ctx2.setLineDash([6,4]);
      ctx2.beginPath();ctx2.moveTo(through.x,through.y);ctx2.lineTo(through.x+(land.x-through.x)*le,through.y+(land.y-through.y)*le);ctx2.stroke();
      ctx2.setLineDash([]);
      // Dirt cloud
      if(t>.75){
        const dt=(t-.75)/.25;
        for(let k=0;k<6;k++){
          const a=k*(Math.PI*2/6)+dt*2;const r=land.w*.3*dt;
          ctx2.fillStyle=`rgba(107,62,30,${.5*(1-dt)})`;
          ctx2.beginPath();ctx2.arc(land.x+Math.cos(a)*r,land.y+Math.sin(a)*r,5*(1-dt),0,Math.PI*2);ctx2.fill();
        }
      }
    }
  });
}

// ── SNAKE: teeth + wiggly line ──
function playSnakeAnim(placedIdx,prevIdx,poisonedIdxs){
  const placed=getCellCenter(placedIdx);
  const prev=prevIdx>=0?getCellCenter(prevIdx):null;
  addAnim(800,(ctx2,t)=>{
    const e=ease(t);
    // Wiggly snake line from prev to placed
    if(prev&&t<.6){
      const lt=t/.6;ctx2.strokeStyle=`rgba(30,122,74,${.8*(1-lt)})`;ctx2.lineWidth=3;
      ctx2.beginPath();ctx2.moveTo(prev.x,prev.y);
      const steps=8;for(let k=1;k<=steps;k++){
        const p=k/steps*lt;const nx=prev.x+(placed.x-prev.x)*p,ny=prev.y+(placed.y-prev.y)*p;
        const wave=Math.sin(p*Math.PI*3+t*10)*8*(1-p);
        ctx2.lineTo(nx+wave,ny+wave*.5);
      }ctx2.stroke();
    }
    // Spiky teeth on poisoned cells
    if(t>.3){
      const pt=(t-.3)/.7;
      poisonedIdxs.forEach(pi=>{
        const pc=getCellCenter(pi);
        for(let k=0;k<4;k++){
          const a=k*Math.PI/2+pt*2;const r=pc.w*.35*Math.min(1,pt*3);
          ctx2.strokeStyle=`rgba(30,122,74,${.7*(1-pt*.7)})`;ctx2.lineWidth=2;
          ctx2.beginPath();ctx2.moveTo(pc.x,pc.y);ctx2.lineTo(pc.x+Math.cos(a)*r,pc.y+Math.sin(a)*r);ctx2.stroke();
        }
      });
    }
  });
}

// ── FACTOTUM: slot machine roll ──
function playFactotumAnim(idx,finalId,s,done){
  const c=getCellCenter(idx);
  const chars=['X','O','S','M','Q'];const chColors=['#c0392b','#1a5fa8','#1e7a4a','#6b3e1e','#b89000'];
  const fi=FACTOTUM_POOL.indexOf(finalId);
  addAnim(800,(ctx2,t)=>{
    const rolls=Math.floor(t*chars.length*2);
    const ci=(fi+rolls)%chars.length;
    const prog=Math.min(1,t*1.5);
    // Background gradient
    const gc=ctx2.createLinearGradient(c.x-c.w*.4,c.y,c.x+c.w*.4,c.y);
    gc.addColorStop(0,`rgba(201,120,32,${.3*prog})`);
    gc.addColorStop(1,`rgba(${chColors[ci].slice(1).match(/../g).map(h=>parseInt(h,16)).join(',')},${.3*prog})`);
    ctx2.fillStyle=gc;ctx2.fillRect(c.x-c.w*.4,c.y-c.h*.4,c.w*.8,c.h*.8);
    // Rolling char
    ctx2.fillStyle=t>.7?`rgba(201,120,32,${(t-.7)/.3})`:`rgba(${chColors[ci].slice(1).match(/../g).map(h=>parseInt(h,16)).join(',')},0.9)`;
    ctx2.font=`bold ${c.w*.5}px 'DM Serif Display',serif`;
    ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.fillText(t>.85?chars[fi]:chars[ci],c.x,c.y);
  },done);
}

// ══ BOT AI ══
const lscore=(b,v)=>{let s=0;for(const w of WINS){const m=w.filter(i=>b[i]===v).length,t=w.filter(i=>b[i]!==null&&b[i]!==v).length;if(t===0&&m>0)s+=m*m*m;}return s;};
const cwn=(b,v,i)=>{const nb=[...b];nb[i]=v;return WINS.some(w=>w.every(j=>nb[j]===v));};
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const empt=b=>b.map((v,i)=>v===null?i:-1).filter(i=>i>=0);
function bestH(b,v,ov,pool){if(!pool.length)return null;let best=-Infinity,r=pool[0];for(const i of pool){const nb=[...b];nb[i]=v;const s=lscore(nb,v)-lscore(nb,ov);if(s>best){best=s;r=i;}}return r;}
function smart(b,v,ov,pool){if(!pool.length)return null;for(const i of pool)if(cwn(b,v,i))return i;for(const i of pool)if(cwn(b,ov,i))return i;return bestH(b,v,ov,pool);}

function botPlace(s){
  const v=sym(s),ov=sym(1-s),co=cancelledOut(s),eid=effId(s);
  let pool=rch(s).id==='mole'?moleValidPlacements(s):empt(board);
  if(!pool.length)return null;
  for(const i of pool)if(cwn(board,v,i))return i;
  for(const i of pool)if(cwn(board,ov,i))return i;
  if(pTurnCnt[s]===0&&diff!=='hard'){const mid=[5,6,9,10],me=mid.filter(i=>board[i]===null&&pool.includes(i));if(me.length&&Math.random()<.6)return rnd(me);return rnd(pool);}
  if(eid==='snake'&&!co){
    const fc=pool.filter(i=>canEatFruit(s,i));if(fc.length&&(diff==='hard'||Math.random()<.45))return rnd(fc);
    let best=-Infinity,r=pool[0];for(const i of pool){const nb=[...board];nb[i]=v;const ph=adjO(i).filter(j=>nb[j]!==null&&poison[j]===0).length;const fn=pool.filter(j=>j!==i&&canEatFruit(s,j)&&adjO(i).includes(j)).length;const sc=lscore(nb,v)-lscore(nb,ov)+ph*5+fn*9;if(sc>best){best=sc;r=i;}}return r;
  }
  if(eid==='quantum'&&!co){let best=-Infinity,r=pool[0];for(const i of pool){const nb=[...board];nb[i]=v;const r0=Math.floor(i/N),c0=i%N;let g=0;for(let cc=0;cc<N;cc++){const j=r0*N+cc;if(j!==i&&nb[j]===null)g++;}for(let rr=0;rr<N;rr++){const j=rr*N+c0;if(j!==i&&nb[j]===null)g++;}const sc=lscore(nb,v)-lscore(nb,ov)+g*2;if(sc>best){best=sc;r=i;}}return r;}
  if(diff==='easy')return Math.random()<.3?bestH(board,v,ov,pool):rnd(pool);
  if(diff==='medium')return bestH(board,v,ov,pool);
  const safe=pool.filter(i=>{const nb=[...board];nb[i]=v;return!empt(nb).some(j=>cwn(nb,ov,j));});
  return bestH(board,v,ov,safe.length?safe:pool);
}
function botPwr(s){
  if(cancelledOut(s))return null;
  const eid=effId(s),v=sym(s),ov=sym(1-s),tgts=getPwrTargets(s);if(!tgts.length)return null;
  if(eid==='expunger'){let best=-1,r=tgts[0];for(const i of tgts){const nb=[...board];nb[i]=null;const g=lscore(board,ov)-lscore(nb,ov);if(g>best){best=g;r=i;}}return r;}
  if(eid==='original'){for(const i of tgts)if(cwn(board,v,i))return i;let best=-Infinity,r=tgts[0];for(const i of tgts){const nb=[...board];nb[i]=v;const s2=lscore(nb,v)-lscore(nb,ov);if(s2>best){best=s2;r=i;}}return r;}
  if(eid==='mole'){let best=-1,r=tgts[0];for(const i of tgts){const nb=[...board];nb[i]=v;const g=lscore(board,ov)-lscore(nb,ov);if(g>best){best=g;r=i;}}return r;}
  return null;
}
function doBotBonus(s){
  if(over)return;
  const eid=effId(s),v=sym(s);
  const pool=empt(board);if(!pool.length){finishAfterBonus(s);return;}
  let m;
  if(eid==='snake'||(rch(s).id==='factotum'&&factPower[s]==='snake')){
    let best=-Infinity;m=pool[0];
    for(const i of pool){const nb=[...board];nb[i]=v;const ph=adjO(i).filter(j=>nb[j]!==null&&poison[j]===0).length;const sc=lscore(nb,v)+ph*5;if(sc>best){best=sc;m=i;}}
  } else m=smart(board,v,sym(1-s),pool)||rnd(pool);
  fruit[m]=0;
  board[m]=v;lastP[s]=m;
  if(eid==='snake'||(rch(s).id==='factotum'&&factPower[s]==='snake'))venomBloom(m,s);
  const win=chkWin(s);if(win){renderBoard();markWin(win);endGame(s);return;}
  if(chkDraw()){renderBoard();endGame(-1);return;}
  bonusSlot=-1;const eid2=effId(s);
  if(eid2==='mole'&&!cancelledOut(s)){const tgts=getPwrTargets(s);if(tgts.length>0){moleExpecting=s;phase='power';renderBoard();setStatus();setTimeout(doBot,300);return;}}
  phase='power';renderBoard();setStatus();const tgts=getPwrTargets(s);if(tgts.length===0)autoAdvance(s);else setTimeout(doBot,300);
}
function doBot(){
  if(over||!isBot())return;
  botThink=true;renderBoard();setStatus();
  const d=diff==='hard'?600:diff==='medium'?380:220;
  setTimeout(()=>{
    if(over){botThink=false;return;}
    if(phase==='place'){pTurnCnt[turnIdx]++;moleFrom=-1;const m=botPlace(turnIdx);botThink=false;if(m==null){renderBoard();setStatus();return;}moleFrom=m;doPlace(m,turnIdx,false);}
    else if(phase==='bonus'){botThink=false;doBotBonus(bonusSlot);}
    else if(phase==='power'){const r=botPwr(moleExpecting>=0?moleExpecting:turnIdx);botThink=false;if(r!=null)doPwr(r,moleExpecting>=0?moleExpecting:turnIdx);else advanceTurn();}
  },d);
}

// ══ AMBIENT ══
(function(){
  const el=document.getElementById('ambient');
  const chars=['X','O','S','F','M','Q'];
  const themes=[{fg:'var(--r)',bg:'var(--r-l)',bd:'var(--r-m)'},{fg:'var(--b)',bg:'var(--b-l)',bd:'var(--b-m)'},{fg:'var(--g)',bg:'var(--g-l)',bd:'var(--g-m)'},{fg:'var(--o)',bg:'var(--o-l)',bd:'var(--o-m)'},{fg:'var(--w)',bg:'var(--w-l)',bd:'var(--w-m)'},{fg:'var(--y)',bg:'var(--y-l)',bd:'var(--y-m)'}];
  const tiles=[];
  function makeTile(){
    const ci=Math.floor(Math.random()*chars.length),t=themes[ci];
    const d=document.createElement('div');d.className='amb';d.textContent=chars[ci];
    d.style.color=t.fg;d.style.background=t.bg;d.style.border='1.5px solid '+t.bd;
    d.style.fontSize=(Math.random()<.25?'2.6rem':(Math.random()<.5?'1.8rem':'2.1rem'));
    const side=Math.random()<.5?66:72;d.style.width=side+'px';d.style.height=side+'px';
    el.appendChild(d);return d;
  }
  function placeTile(d){
    const vw=window.innerWidth,vh=window.innerHeight,x=Math.random()*vw-36;
    const bias=Math.random();
    const sy=bias<.55?(-70-Math.random()*.5*vh):bias<.85?(-36-Math.random()*.1*vh):(Math.random()*.25*vh-36);
    const rot=(Math.random()-.5)*36,spin=(Math.random()-.5)*18,dur=18+Math.random()*22,del=-(Math.random()*dur),pk=.09+Math.random()*.13;
    d.style.left=Math.round(x)+'px';
    d.style.setProperty('--sy',Math.round(sy)+'px');d.style.setProperty('--rot',rot+'deg');
    d.style.setProperty('--spin',spin+'deg');d.style.setProperty('--pk',pk);
    d.style.animationName='ambfall';d.style.animationDuration=dur+'s';d.style.animationDelay=del+'s';
    d.style.animationTimingFunction='linear';d.style.animationIterationCount='infinite';
    d.style.zIndex=pk<.11?0:pk<.16?1:2;
  }
  for(let k=0;k<55;k++){const d=makeTile();placeTile(d);tiles.push(d);}
  setInterval(()=>placeTile(tiles[Math.floor(Math.random()*tiles.length)]),5000);
})();
