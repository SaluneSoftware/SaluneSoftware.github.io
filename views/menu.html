<!-- Splash: channel art + title -->
<div class="splash-screen">
  <div class="splash-title"></div>
</div>

<!-- Splash bar: Salune Menu / Start -->
<div class="splash-bar">
  <div class="splash-buttons">
    <a href="javascript:void(0)" class="btn menu-btn"
       onmouseover="hover()" onclick="backToMenu()">Salune Menu</a>
    <a href="javascript:void(0)" class="btn start-btn"
       onmouseover="hover()" onclick="startChannel()">Start</a>
  </div>
</div>

<!-- Warning overlay: fade black → image → black → action -->
<div class="warning-overlay" id="warningOverlay">
  <img src="assets/images/WiiRemoteWarning.png" class="warning-img" id="warningImg" alt="Safety Warning">
</div>

<!-- Video modal -->
<div class="video-modal" id="videoModal">
  <div class="video-modal-inner">
    <button class="video-modal-close" onclick="closeVideoModal()">✕ Close</button>
    <iframe id="videoFrame" src="" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</div>
