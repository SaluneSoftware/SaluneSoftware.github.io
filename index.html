<!doctype html>
<html>
  <head>
    <title>Tommy van der Laan // Salune</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/universal.css">
    <link rel="stylesheet" href="assets/css/menu.css">
    <link rel="stylesheet" href="assets/css/settings.css">
    <link href="https://fonts.googleapis.com/css?family=Asap:500" rel="stylesheet">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="assets/js/imagesloaded.pkgd.min.js"></script>
    <script src="assets/js/views.js"></script>
    <script src="assets/js/main.js"></script>
  </head>

  <body>
    <div class="app"></div>
    <div class="black"></div>

    <div class="sfx">
      <!--
        Autoplay trick: the hidden iframe loads bgmusic.html which has
        autoplay on the audio tags — this bypasses browser autoplay policy
        because iframes with allow="autoplay" can play audio after a
        user gesture on the parent page (or sometimes immediately).
        The main audio elements below are the "real" ones used by JS.
      -->
      <iframe src="assets/audio/bgmusic.html" allow="autoplay"
              style="display:none" id="bgmusic-iframe"></iframe>

      <audio id="startup"   src="assets/audio/startup.mp3"   preload="auto"></audio>
      <audio id="bg-music"  src="assets/audio/bg-music.mp3"  loop preload="auto"></audio>
      <audio id="hover"     src="assets/audio/button-hover.mp3"  preload="auto"></audio>
      <audio id="select"    src="assets/audio/button-select.mp3" preload="auto"></audio>
      <audio id="zip"       src="assets/audio/zip.mp3"        preload="auto"></audio>
      <audio id="back"      src="assets/audio/back.mp3"       preload="auto"></audio>
      <audio id="bottomBtn" src="assets/audio/bottom-btn.mp3" preload="auto"></audio>
    </div>
  </body>
</html>
